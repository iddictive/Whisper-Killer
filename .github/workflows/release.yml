name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Calculate Version
        id: versioning
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          APP_VERSION="2.0.$COMMIT_COUNT"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Build App
        run: |
          swift build -c release
          mkdir -p WhisperFree.app/Contents/MacOS
          mkdir -p WhisperFree.app/Contents/Resources
          
          # Find the binary dynamically
          ACTUAL_BINARY=$(find .build -maxdepth 5 -name "WhisperFree" -type f -not -path "*.dSYM*" | grep release | head -n 1)
          if [ -z "$ACTUAL_BINARY" ]; then
            echo "❌ Binary not found!"
            find .build -name "WhisperFree" -type f 2>/dev/null
            exit 1
          fi
          echo "Found binary at: $ACTUAL_BINARY"
          
          cp "$ACTUAL_BINARY" WhisperFree.app/Contents/MacOS/
          chmod +x WhisperFree.app/Contents/MacOS/WhisperFree
          
          cp Sources/WhisperFree/Resources/Info.plist WhisperFree.app/Contents/
          
          # Inject metadata into Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.APP_VERSION }}" "WhisperFree.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.APP_VERSION }}" "WhisperFree.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable WhisperFree" "WhisperFree.app/Contents/Info.plist"
          
          if [ -f Sources/WhisperFree/Resources/AppIcon.icns ]; then
            cp Sources/WhisperFree/Resources/AppIcon.icns WhisperFree.app/Contents/Resources/
          fi
          
          # Ad-hoc sign after all files are in place
          codesign --force --deep --sign - WhisperFree.app

      - name: Create DMG
        run: |
          hdiutil create -volname "WhisperFree" -srcfolder "WhisperFree.app" -ov -format UDZO "WhisperFree.dmg"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: WhisperFree v${{ env.APP_VERSION }}
          files: |
            WhisperFree.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
